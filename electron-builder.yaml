# Desktop packaging (Electron) — Windows + Linux product channels.
# Public macOS product is the *native* Swift app (App Store only) — see docs/MAC_APP_STORE.md.
# Electron mac targets remain for local lab builds only (`npm run electron:build:mac`).
appId: com.quenderin.desktop
productName: Quenderin
directories:
  output: release
  # Icon resources (icon.icns / icon.ico / icon.png) — build/ is gitignored TS output,
  # so the electron-builder resources live under brand/ instead.
  buildResources: brand/electron
mac:
  category: public.app-category.productivity
  # Lab / R&D only — not a public distribution channel.
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
linux:
  category: Utility
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
        - armv7l
    - target: deb
      arch:
        - x64
        - arm64
        - armv7l
    - target: tar.gz
      arch:
        - x64
        - arm64
        - armv7l
win:
  target:
    # GitHub Releases + website direct download (unsigned → SmartScreen; store path removes it).
    - target: nsis
      arch:
        - x64
        - arm64
    - target: portable
      arch:
        - x64
    # Microsoft Store package — build with: npm run electron:build:win:store
    # Fill appx.* identity fields from Partner Center before upload (docs/MICROSOFT_STORE.md).
    - target: appx
      arch:
        - x64
# Version-less artifact names so the website can link
# github.com/…/releases/latest/download/<name> and never go stale. nsis and
# portable are both .exe — they need distinct names or they'd overwrite each other.
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: "Quenderin-Setup-${arch}.exe"
portable:
  artifactName: "Quenderin-Portable-${arch}.exe"
appImage:
  artifactName: "Quenderin-${arch}.AppImage"
deb:
  artifactName: "Quenderin-${arch}.deb"
appx:
  # --- Replace these from Partner Center → Product identity (docs/MICROSOFT_STORE.md §3) ---
  # identityName: e.g. Contoso.Quenderin
  # publisher: CN=XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX  (must match Partner Center publisher ID)
  # publisherDisplayName: your registered publisher display name
  applicationId: Quenderin
  displayName: Quenderin
  identityName: Quenderin.Desktop
  publisherDisplayName: Quenderin
  # languages the Store listing supports (ISO codes)
  languages:
    - en-US
  artifactName: "Quenderin-Store-${arch}.appx"
  # backgroundColor for the Store tile chrome (hex)
  backgroundColor: "#0B0F14"
files:
  - dist/**/*
  - node_modules/**/*
  - public/**/*
  - package.json
  # Runtime data next to dist/ inside the asar (sampling-profiles, model catalog, safety list).
  # samplingProfiles.ts resolves ../../../shared from dist/src/services — without this glob the
  # packaged local-inference path falls back to EMBEDDED recipes (or used to hard-throw).
  - shared/**/*
  # Q-643: trim non-runtime bloat from the bundled node_modules. These globs exclude ONLY files that
  # never execute in the packaged app — test/example fixtures, sourcemaps, and TypeScript type
  # declarations — so no production dependency is dropped (unlike removing the node_modules glob
  # wholesale, which risks pruning a needed transitive dep). Real size win, zero runtime risk.
  - "!node_modules/**/{test,tests,__tests__,example,examples,.github,.nyc_output,coverage}/**"
  - "!node_modules/**/*.{map,d.ts,markdown}"
  - "!node_modules/**/*.md"
# Enable the asar archive (audit HIGH #9): app source ships as a single read-only archive instead
# of loose, trivially-modifiable files. Native addons (*.node) and the modules that load them can't
# run from inside an asar, so unpack them — the **/*.node catch-all plus the known native packages.
asar: true
asarUnpack:
  - "**/*.node"
  - "node_modules/node-llama-cpp/**"
  - "node_modules/@node-llama-cpp/**"
  - "node_modules/sharp/**"
  - "node_modules/@img/**"
  - "node_modules/hnswlib-node/**"
  - "node_modules/tesseract.js/**"
  - "node_modules/tesseract.js-core/**"
# Code signing + notarization require YOUR developer certificates and can't be committed:
# Windows GitHub .exe → optional Authenticode (CSC_LINK); Microsoft Store signs AppX for you.
# macOS public product is the native App Store build (not this Electron config).
