appId: com.quenderin.desktop
productName: Quenderin
directories:
  output: release
  # Icon resources (icon.icns / icon.ico / icon.png) — build/ is gitignored TS output,
  # so the electron-builder resources live under brand/ instead.
  buildResources: brand/electron
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
linux:
  category: Utility
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
        - armv7l
    - target: deb
      arch:
        - x64
        - arm64
        - armv7l
    - target: tar.gz
      arch:
        - x64
        - arm64
        - armv7l
win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: portable
      arch:
        - x64
# Version-less artifact names so the website can link
# github.com/…/releases/latest/download/<name> and never go stale. nsis and
# portable are both .exe — they need distinct names or they'd overwrite each other.
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: "Quenderin-Setup-${arch}.exe"
portable:
  artifactName: "Quenderin-Portable-${arch}.exe"
appImage:
  artifactName: "Quenderin-${arch}.AppImage"
deb:
  artifactName: "Quenderin-${arch}.deb"
files:
  - dist/**/*
  - node_modules/**/*
  - public/**/*
  - package.json
# Enable the asar archive (audit HIGH #9): app source ships as a single read-only archive instead
# of loose, trivially-modifiable files. Native addons (*.node) and the modules that load them can't
# run from inside an asar, so unpack them — the **/*.node catch-all plus the known native packages.
asar: true
asarUnpack:
  - "**/*.node"
  - "node_modules/node-llama-cpp/**"
  - "node_modules/@node-llama-cpp/**"
  - "node_modules/sharp/**"
  - "node_modules/@img/**"
  - "node_modules/hnswlib-node/**"
  - "node_modules/tesseract.js/**"
  - "node_modules/tesseract.js-core/**"
# Code signing + notarization (rest of audit HIGH #9) require YOUR developer certificates and can't
# be committed: macOS → set CSC_LINK / CSC_KEY_PASSWORD and add `mac.notarize: true` with
# APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID; Windows → CSC_LINK for an Authenticode cert.
# Until then builds are unsigned (Gatekeeper/SmartScreen will warn).
