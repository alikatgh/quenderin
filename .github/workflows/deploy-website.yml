name: Deploy website

# Publishes the static marketing site in website/ to GitHub Pages.
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".
on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v6
        with:
          # Self-enable Pages on first run — the manual Settings→Pages step was never
          # done, so every deploy since the redesign died here with "Not Found".
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website
      - id: deployment
        uses: actions/deploy-pages@v4

  # Mirrors the same content to Cloudflare. quenderin.org is served by the WORKER named
  # "quenderin" (Workers custom domain — discovered 2026-07-04 after Pages deploys silently
  # went nowhere); the Pages project is only the quenderin.pages.dev preview.
  # No-ops gracefully until the CLOUDFLARE_API_TOKEN repo secret is set (one-time:
  # dash.cloudflare.com → My Profile → API Tokens → Create → custom with
  # "Workers Scripts: Edit" + "Cloudflare Pages: Edit",
  # then `gh secret set CLOUDFLARE_API_TOKEN -R alikatgh/quenderin`).
  cloudflare:
    runs-on: ubuntu-latest
    env:
      CF_TOKEN_SET: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        if: env.CF_TOKEN_SET == 'true'
      - name: Deploy quenderin.org (the Worker)
        if: env.CF_TOKEN_SET == 'true'
        run: npx --yes wrangler deploy --config wrangler.site.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 4c1e57b6972105286a7aeb46b2b89c78
      - name: Deploy the Pages preview (quenderin.pages.dev)
        if: env.CF_TOKEN_SET == 'true'
        run: npx --yes wrangler pages deploy website --project-name quenderin --branch main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 4c1e57b6972105286a7aeb46b2b89c78
      - name: Skipped (no CLOUDFLARE_API_TOKEN secret yet)
        if: env.CF_TOKEN_SET != 'true'
        run: echo "Cloudflare deploy skipped — set the CLOUDFLARE_API_TOKEN repo secret to enable."
