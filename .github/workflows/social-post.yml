name: Quenderin → Facebook

# Auto-publishes the scheduled post to the Facebook Page on Mon/Wed/Fri:
#   Mon = model/feature spotlight · Wed = behind the engineering · Fri = reality
# Content comes from docs/social/calendar.json (generated by
# scripts/gen-social-posts.cjs). The poster picks the entry whose date == today
# and drops the link as the first comment.
#
# Dormant until you add the two secrets below — without them the poster runs,
# finds no token, prints what it would post, and exits cleanly.
#
# One-time setup (Settings → Secrets and variables → Actions):
#   FB_PAGE_ID     — the Facebook Page's numeric id
#   FB_PAGE_TOKEN  — a long-lived Page access token (pages_manage_posts scope)
# See docs/social/FACEBOOK_SETUP.md for how to mint the token.

on:
  schedule:
    - cron: '0 14 * * 1,3,5' # 14:00 UTC Mon/Wed/Fri (17:00 Moscow / 09:00 US-Central)
  workflow_dispatch:
    inputs:
      date:
        description: 'Force a specific calendar date YYYY-MM-DD (optional)'
        required: false
      dry_run:
        description: 'Print what would post without sending (true/false)'
        required: false
        default: 'false'

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Publish scheduled post
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          # Full-auto: the cron covers the WHOLE calendar from launch. Add the
          # token before Mon 2026-07-27 and every Mon/Wed/Fri post fires itself
          # through December — no hand-scheduling. This guard just refuses to
          # post anything dated before the calendar starts.
          FB_AUTOPILOT_FROM: '2026-07-27'
        run: |
          FLAGS=""
          if [ -n "${{ inputs.date }}" ]; then FLAGS="--date ${{ inputs.date }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then FLAGS="$FLAGS --dry-run"; fi
          node scripts/post-to-facebook.cjs $FLAGS
