name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# GitHub deprecated the Node-20 action runtime (2026-06-16). Opt every JS action into Node 24
# now — safer than bumping each action's major version blind, and clears the deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Least-privilege GITHUB_TOKEN (audit MEDIUM): default to read-only for every job. A compromised
# action/dependency then can't push commits, open PRs, or mutate releases with the workflow token.
# Jobs that need more (e.g. codecov OIDC) opt in explicitly.
permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (high+)
        run: npm audit --audit-level=high

      - name: Run linter
        run: npm run lint

      - name: Run recommendation guardrail
        run: npm run check:recommendation

      - name: Run tests
        run: npm test

      - name: Golden chore suite (governed fs.* capabilities, no LLM)
        run: npm run test:golden-chores

      - name: Build
        run: npm run build

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write   # codecov v4 tokenless upload (OIDC)

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4 — pinned to SHA (audit MEDIUM: third-party action)
        with:
          fail_ci_if_error: false

  # ── Mobile + cross-platform gates (audit C14/H11: these suites previously ran only
  #    locally, so they could regress silently). All three commands are the same ones
  #    documented in STATUS.md and verified locally. ──────────────────────────────────
  mobile-ios:
    name: iOS (QuenderinKit) tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Run QuenderinKit tests
        working-directory: apple/QuenderinKit
        run: swift test

  mobile-android-core:
    name: Android core (Kotlin) checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Kotlin compiler
        run: |
          curl -sSLO https://github.com/JetBrains/kotlin/releases/download/v2.0.21/kotlin-compiler-2.0.21.zip
          # Verify the download before trusting it (audit MEDIUM: a network-fetched toolchain ran
          # unverified). Pinned sha256 of the official v2.0.21 release asset; fail closed on mismatch.
          echo "0352c0a45bd22f80f6b26e485cd04da8047baa5de54865281fb9f89a4a7bcf2a  kotlin-compiler-2.0.21.zip" | sha256sum -c -
          unzip -q kotlin-compiler-2.0.21.zip -d "$HOME/kotlin"
          echo "$HOME/kotlin/kotlinc/bin" >> "$GITHUB_PATH"
      - name: Compile + run the pure-Kotlin core verification
        run: |
          kotlinc android/quenderin-core/src/main/kotlin/ai/quenderin/core/*.kt \
            android/quenderin-core/src/verify/CoreVerify.kt -include-runtime -d /tmp/qcore.jar
          java -jar /tmp/qcore.jar

  mobile-android-app:
    name: Android app (assembleDebug)
    runs-on: ubuntu-latest
    # Builds the real :app module — Compose UI + AndroidManifest merge. The kotlinc-core job
    # above cannot catch app-module breakage (missing imports, bad @Composable, manifest errors);
    # only a full Gradle build does (see BUG_JOURNAL.md, 2026-06-15). Verified locally on JDK 21.
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3 — pinned to SHA (audit MEDIUM: third-party action)
      - name: Build the debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --no-daemon --console=plain

  mobile-android-jni:
    name: Android JNI (C++ syntax-check)
    runs-on: ubuntu-latest
    # Q-592: nothing else in CI compiles the JNI bridge (android/jni/llama_jni.cpp) — the app build
    # skips it (no jni/llama.cpp checked in), so an NDK/native regression could ship undetected. This
    # syntax-checks it with the pre-installed NDK clang against real llama.cpp headers (HEAD of
    # ggml-org/llama.cpp — the same ref android/verify-llama-link.sh clones for the on-device build).
    steps:
      - uses: actions/checkout@v4
      - name: Fetch llama.cpp headers (shallow, matches verify-llama-link.sh)
        run: git clone --depth 1 https://github.com/ggml-org/llama.cpp.git /tmp/llama.cpp
      - name: Syntax-check the JNI bridge
        run: |
          NDK="${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_HOME}"
          NDK_CLANG="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/clang++" \
          LLAMA_INCLUDE=/tmp/llama.cpp/include \
          GGML_INCLUDE=/tmp/llama.cpp/ggml/include \
            bash scripts/check-jni-syntax.sh

  catalog-parity:
    name: Model catalog parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Manifest is regenerated from the desktop catalog (no drift)
        run: |
          python3 scripts/export_catalog.py
          git diff --exit-code shared/model-catalog.json
      - name: All three platform catalogs agree (ids, params, quant, sha256)
        run: python3 scripts/check_catalog_parity.py
      - name: Agent-logic parity suites cover the same vectors (iOS + Android)
        run: python3 scripts/check_agent_parity.py
      - name: Model-router parity suites cover the same vectors (iOS + Android)
        run: python3 scripts/check_router_parity.py
      - name: Safety blocklist is one list across iOS + Android + Desktop
        run: python3 scripts/check_safety_parity.py
      - name: Sampling recipes match shared/sampling-profiles.json (Swift/Kotlin/JNI)
        run: python3 scripts/check_sampling_parity.py
