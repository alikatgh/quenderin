name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run recommendation guardrail
        run: npm run check:recommendation

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

  # ── Mobile + cross-platform gates (audit C14/H11: these suites previously ran only
  #    locally, so they could regress silently). All three commands are the same ones
  #    documented in STATUS.md and verified locally. ──────────────────────────────────
  mobile-ios:
    name: iOS (QuenderinKit) tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Run QuenderinKit tests
        working-directory: apple/QuenderinKit
        run: swift test

  mobile-android-core:
    name: Android core (Kotlin) checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Kotlin compiler
        run: |
          curl -sSLO https://github.com/JetBrains/kotlin/releases/download/v2.0.21/kotlin-compiler-2.0.21.zip
          unzip -q kotlin-compiler-2.0.21.zip -d "$HOME/kotlin"
          echo "$HOME/kotlin/kotlinc/bin" >> "$GITHUB_PATH"
      - name: Compile + run the pure-Kotlin core verification
        run: |
          kotlinc android/quenderin-core/src/main/kotlin/ai/quenderin/core/*.kt \
            android/quenderin-core/src/verify/CoreVerify.kt -include-runtime -d /tmp/qcore.jar
          java -jar /tmp/qcore.jar

  mobile-android-app:
    name: Android app (assembleDebug)
    runs-on: ubuntu-latest
    # Builds the real :app module — Compose UI + AndroidManifest merge. The kotlinc-core job
    # above cannot catch app-module breakage (missing imports, bad @Composable, manifest errors);
    # only a full Gradle build does (see BUG_JOURNAL.md, 2026-06-15). Verified locally on JDK 21.
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Build the debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --no-daemon --console=plain

  catalog-parity:
    name: Model catalog parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Manifest is regenerated from the desktop catalog (no drift)
        run: |
          python3 scripts/export_catalog.py
          git diff --exit-code shared/model-catalog.json
      - name: All three platform catalogs agree (ids, params, quant, sha256)
        run: python3 scripts/check_catalog_parity.py
