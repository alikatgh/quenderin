# Builds the desktop app (Electron + node-llama-cpp) for Windows and Linux on GitHub's
# free public-repo runners and attaches the installers to a GitHub Release. The website's
# download links point at releases/latest/download/<stable-name> — cutting a new release
# updates every link automatically.
#
# macOS is deliberately absent here: the Mac app is the native SwiftUI one, distributed
# separately (owner call, 2026-07-04).
name: Desktop release (Windows + Linux)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --win nsis portable --x64
          - os: ubuntu-latest
            args: --linux AppImage deb --x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies (root + ui via postinstall)
        run: npm ci
      # Gate the release on the same checks CI runs — a tagged build must not ship code that
      # fails typecheck/lint/tests (Q-144). Runs once on the Linux leg only (identical result
      # on both, and it keeps the Windows packaging leg fast).
      - name: Typecheck, lint, and test
        if: matrix.os == 'ubuntu-latest'
        run: |
          npm run typecheck
          npm run lint
          npm test
      - name: Build backend + dashboard UI
        run: npm run build
      - name: Package
        run: npx electron-builder ${{ matrix.args }} --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.AppImage
            release/*.deb
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true
      - name: Determine release tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          fi
      - name: Create or update the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release view "$TAG" >/dev/null 2>&1 \
            || gh release create "$TAG" --title "Quenderin $TAG" --generate-notes
          gh release upload "$TAG" assets/* --clobber
