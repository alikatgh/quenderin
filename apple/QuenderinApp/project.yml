# XcodeGen spec for the Quenderin app targets (iOS + macOS).
# Generate the project:  brew install xcodegen && cd apple/QuenderinApp && xcodegen
# Then open Quenderin.xcodeproj in Xcode: Run "Quenderin" on a simulator/device, or
# "QuenderinMac" on this Mac. Both targets share Sources/ and QuenderinKit — the same
# app, two platforms (llama.xcframework carries a macOS Metal slice, so the Mac build
# does real on-device inference too).
name: Quenderin
options:
  bundleIdPrefix: ai.quenderin
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
packages:
  QuenderinKit:
    path: ../QuenderinKit
targets:
  Quenderin:
    type: application
    platform: iOS
    sources:
      - Sources
      - PrivacyInfo.xcprivacy
      - Assets.xcassets
      # String catalog (ru first — Russian-first users; ko/ja/zh-Hans pending). Generated by
      # scripts/build_xcstrings.py from scripts/translations.tsv — edit the TSV, not this file.
      - Localizable.xcstrings
      - InfoPlist.xcstrings
    dependencies:
      - package: QuenderinKit
        product: QuenderinKit
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: 3
        DEVELOPMENT_TEAM: 9M2B2P4KSA
        CODE_SIGN_STYLE: Automatic
        # iPhone-only for the first release: the iPad layout is untested, and
        # portrait-only iPad without UIRequiresFullScreen fails validation.
        # (The Mac app is the big-screen story; revisit for 0.3.)
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Quenderin
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "3"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        # T1 device perception (device.calendar.today) — read-only; the OS prompt is the grant.
        NSCalendarsUsageDescription: >-
          Quenderin's on-device assistant can read today's calendar events when you ask it to —
          only with your permission, and nothing leaves your phone.
        NSCalendarsFullAccessUsageDescription: >-
          Quenderin's on-device assistant can read today's calendar events when you ask it to —
          only with your permission, and nothing leaves your phone.

  # The macOS client — same sources, same QuenderinKit, Metal inference via the
  # xcframework's macos slice. Sandboxed + hardened runtime from day one so the
  # target is Mac App Store-submittable without settings archaeology later.
  QuenderinMac:
    type: application
    platform: macOS
    sources:
      - Sources
      - PrivacyInfo.xcprivacy
      - Assets.xcassets
      # Same string catalog as iOS — QuenderinKit's SwiftUI strings resolve via Bundle.main.
      - Localizable.xcstrings
      - InfoPlist.xcstrings
    dependencies:
      - package: QuenderinKit
        product: QuenderinKit
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Universal purchase with the iOS app: same bundle id on both platforms.
        PRODUCT_BUNDLE_IDENTIFIER: ai.quenderin.Quenderin
        PRODUCT_NAME: Quenderin
        ENABLE_HARDENED_RUNTIME: YES
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: 4
        DEVELOPMENT_TEAM: 9M2B2P4KSA
        CODE_SIGN_STYLE: Automatic
    info:
      path: Info-macOS.plist
      properties:
        CFBundleDisplayName: Quenderin
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "4"
        LSApplicationCategoryType: public.app-category.productivity
        # Only standard OS crypto (TLS + CryptoKit SHA-256) → exempt under EAR §742.15(b).
        ITSAppUsesNonExemptEncryption: false
        # The agent's opt-in Mac tools drive other apps via Apple Events (AppleScript);
        # macOS shows its per-app Automation consent on first use — this string is that
        # dialog's explanation. Without it (or the matching entitlement) every mac.* tool
        # dies with AppleScript -600 in the sandboxed build (found in review-prep testing).
        NSAppleEventsUsageDescription: >-
          Quenderin's on-device assistant uses Apple Events to work other apps for you —
          only for tools you turn on, only with macOS's own per-app permission, and
          nothing leaves your Mac.
    entitlements:
      path: Quenderin-macOS.entitlements
      properties:
        # App Sandbox is mandatory for the Mac App Store.
        com.apple.security.app-sandbox: true
        # Outbound HTTPS for the model download (Hugging Face); nothing inbound.
        com.apple.security.network.client: true
        # The chat composer's attach button (.fileImporter) — without this the
        # sandboxed open panel silently never presents (App Review 2.1a, 0.2.0(2)).
        com.apple.security.files.user-selected.read-only: true
        # The agent's opt-in Mac tools (open app, front app, clipboard, notes…) send
        # Apple Events; sandbox denies them outright (-600) without this. Gated twice
        # at runtime: the in-app per-tool consent AND macOS's Automation prompt.
        com.apple.security.automation.apple-events: true
